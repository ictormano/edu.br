<style>
:root { --google-blue: #4285f4; --google-red: #ea4335; --google-yellow: #fbbc05; --google-green: #34a853; --text-main: #202124; --text-muted: #5f6368; --border: #dfe1e5; --shadow: 0 2px 10px rgba(32,33,36,.28); --bg: #ffffff; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-color: var(--bg); color: var(--text-main); }

/* Bloco Mobile */
#mobile-blocker { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg); z-index: 999999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; }
#mobile-blocker h1 { color: var(--google-red); margin-bottom: 20px; font-size: 2.5rem; }
#mobile-blocker p { color: var(--text-muted); font-size: 1.5rem; line-height: 1.5; }

.container { margin-top: 12vh; width: 100%; max-width: 1137px; padding: 0 35px; text-align: center; position: relative; }
.logo { font-size: 7.8rem; font-weight: 500; letter-spacing: -3px; margin-bottom: 52px; user-select: none; }
.logo span:nth-child(1) { color: var(--google-blue); }
.logo span:nth-child(2) { color: var(--google-red); }
.logo span:nth-child(3) { color: var(--google-yellow); }
.logo span:nth-child(4) { color: var(--google-blue); }

.search-wrapper { position: relative; width: 100%; z-index: 100; }
.search-box { display: flex; align-items: center; width: 100%; height: 84px; background: var(--bg); border: 2px solid var(--border); border-radius: 42px; padding: 0 28px; transition: box-shadow 0.2s, border-color 0.2s, border-radius 0.2s; position: relative; z-index: 101; }
.search-box.active { box-shadow: var(--shadow); border-color: transparent; border-radius: 42px 42px 0 0; }
.search-box:hover:not(.active) { box-shadow: var(--shadow); border-color: transparent; }

.icon { fill: var(--text-muted); width: 35px; height: 35px; margin-right: 21px; flex-shrink: 0; }
.input-field { flex: 1; border: none; outline: none; font-size: 28px; color: var(--text-main); background: transparent; font-family: 'Courier New', Courier, monospace; text-transform: uppercase; }
.input-field::placeholder { color: var(--text-muted); font-family: -apple-system, sans-serif; text-transform: none; }

.ghost-text { position: absolute; left: 84px; top: 50%; transform: translateY(-50%); pointer-events: none; font-family: 'Courier New', Courier, monospace; font-size: 28px; color: transparent; white-space: pre; }
.ghost-text span { color: #bdc1c6; }

.clear-btn { background: none; border: none; cursor: pointer; display: none; padding: 7px; border-radius: 50%; fill: var(--text-muted); }
.clear-btn.show { display: block; }
.clear-btn:hover { background: #f1f3f4; }

.dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg); border-radius: 0 0 42px 42px; box-shadow: 0 7px 10px rgba(32,33,36,.28); border: 2px solid transparent; border-top: 2px solid var(--border); padding: 14px 0 28px 0; display: none; text-align: left; max-height: 525px; overflow-y: auto;}
.dropdown-item { padding: 14px 28px 14px 84px; display: flex; align-items: center; cursor: pointer; font-size: 26px; }
.dropdown-item:hover, .dropdown-item.focused { background-color: #f1f3f4; }
.dd-code { font-family: 'Courier New', Courier, monospace; font-weight: bold; color: var(--google-blue); width: 157px; flex-shrink: 0; }
.dd-desc { color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.result-area { margin-top: 42px; text-align: left; transition: opacity 0.2s; display: none; }
.result-card { border: 2px solid var(--border); border-radius: 14px; padding: 42px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.result-card.faded { opacity: 0.5; }
.rc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 21px; }
.rc-code { font-family: 'Courier New', Courier, monospace; font-size: 38px; font-weight: 400; color: var(--text-main); }
.rc-tags { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 28px; }
.tag { font-size: 21px; padding: 7px 17px; border-radius: 21px; font-weight: 500; border: 2px solid var(--border); color: var(--text-muted); }
.tag-disc { background: #e8f0fe; color: #1967d2; border-color: transparent; }
.tag-ano { background: #fce8e6; color: #c5221f; border-color: transparent; }

.rc-label { display: flex; align-items: center; justify-content: space-between; font-size: 21px; font-weight: bold; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; margin-top: 28px; }
.rc-topic { font-size: 31px; font-weight: 400; color: var(--google-blue); margin-bottom: 14px; line-height: 1.4; }
.rc-text { font-size: 26px; line-height: 1.58; color: #3c4043; margin-bottom: 14px; }

.copy-btn { background: none; border: none; cursor: pointer; color: var(--google-blue); font-size: 24px; padding: 5px; border-radius: 5px; transition: background 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; }
.copy-btn:hover { background: #e8f0fe; }
.copy-btn:active { transform: scale(0.9); }
</style>
</head>

<div id="mobile-blocker">
  <h1>Acesso Restrito...</h1>

<div class="container" id="main-container">

  <div class="search-wrapper">
    <div class="search-box" id="searchBox">
      <svg class="icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
      <div class="ghost-text" id="ghostText"></div>

    </div>
    <div class="dropdown" id="dropdown"></div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="result-card" id="resultCard">
      <div class="rc-header">
        <div class="rc-code" id="rcCode"></div>

      <div class="rc-tags" id="rcTags"></div>
      
      <div class="rc-label">

        <button class="copy-btn" onclick="copyContent('rcAssunto')" title="Copiar Unidade Temática"><i class="fi fi-rr-copy-alt"></i></button>

      <div class="rc-label">
        <span>Assunto / Conteúdo</span>
        <button class="copy-btn" onclick="copyContent('rcObj')" title="Copiar Assunto/Conteúdo"><i class="fi fi-rr-copy-alt"></i></button>
      </div>
      <div class="rc-text" id="rcObj"></div>
      
      <div class="rc-label">
        <span>Habilidade</span>
        <button class="copy-btn" onclick="copyContent('rcHab')" title="Copiar Habilidade"><i class="fi fi-rr-copy-alt"></i></button>
      </div>

    </div>
  </div>
</div>

<script>
// Lógica de verificação de dispositivo móvel
(function checkMobile() {
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  if (isMobile) {
    document.getElementById('mobile-blocker').style.display = 'flex';
    document.getElementById('main-container').style.display = 'none';
    document.body.style.overflow = 'hidden';
  }
})();

const DATA = [
{"code":"EF15LP01","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Leitura/escuta","obj":"Reconstrução das condições de produção e recepção de textos","hab":"Identificar a função social de textos que circulam em campos da vida social dos quais participa cotidianamente (a casa, a rua, a comunidade, a escola) e nas mídias impressa, de massa e digital, reconhecendo para que foram produzidos, onde circulam, quem os produziu e a quem se destinam."},
{"code":"EF15LP02","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Leitura/escuta","obj":"Estratégia de leitura","hab":"Estabelecer expectativas em relação ao texto que vai ler (pressuposições antecipadoras dos sentidos, da forma e da função social do texto), apoiando-se em seus conhecimentos prévios sobre as condições de produção e recepção desse texto, o gênero, o suporte e o universo temático, bem como sobre saliências textuais, recursos gráficos, imagens, dados da própria obra (índice, prefácio etc.), confirmando antecipações e inferências realizadas antes e durante a leitura de textos, checando a adequação das hipóteses realizadas."},
{"code":"EF15LP03","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Leitura/escuta","obj":"Estratégia de leitura","hab":"Localizar informações explícitas em textos."},
{"code":"EF15LP04","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Leitura/escuta","obj":"Estratégia de leitura","hab":"Identificar o efeito de sentido produzido pelo uso de recursos expressivos gráfico-visuais em textos multissemióticos."},
{"code":"EF15LP05","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Produção de textos","obj":"Planejamento de texto","hab":"Planejar, com a ajuda do professor, o texto que será produzido, considerando a situação comunicativa, os interlocutores (quem escreve/para quem escreve); a finalidade ou o propósito (escrever para quê); a circulação (onde o texto vai circular); o suporte (qual é o portador do texto); a linguagem, organização e forma do texto e seu tema, pesquisando em meios impressos ou digitais, sempre que for preciso, informações necessárias à produção do texto, organizando em tópicos os dados e as fontes pesquisadas."},
{"code":"EF15LP06","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Produção de textos","obj":"Revisão de textos","hab":"Reler e revisar o texto produzido com a ajuda do professor e a colaboração dos colegas, para corrigi-lo e aprimorá-lo, fazendo cortes, acréscimos, reformulações, correções de ortografia e pontuação."},
{"code":"EF15LP07","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Produção de textos","obj":"Edição de textos","hab":"Editar a versão final do texto, em colaboração com os colegas e com a ajuda do professor, ilustrando, quando for o caso, em suporte adequado, manual ou digital."},
{"code":"EF15LP08","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Produção de textos","obj":"Utilização de tecnologia digital","hab":"Utilizar software, inclusive programas de edição de texto, para editar e publicar os textos produzidos, explorando os recursos multissemióticos disponíveis."},
{"code":"EF15LP09","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Oralidade","obj":"Oralidade pública/Intercâmbio conversacional em sala de aula","hab":"Expressar-se em situações de intercâmbio oral com clareza, preocupando-se em ser compreendido pelo interlocutor e usando a palavra com tom de voz audível, boa articulação e ritmo adequado."},
{"code":"EF15LP10","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Oralidade","obj":"Escuta atenta","hab":"Escutar, com atenção, falas de professores e colegas, formulando perguntas pertinentes ao tema e solicitando esclarecimentos sempre que necessário."},
{"code":"EF15LP11","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Oralidade","obj":"Características da conversação espontânea","hab":"Reconhecer características da conversação espontânea presencial, respeitando os turnos de fala, selecionando e utilizando, durante a conversação, formas de tratamento adequadas, de acordo com a situação e a posição do interlocutor."},
{"code":"EF15LP12","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Oralidade","obj":"Aspectos não linguísticos (paralinguísticos) no ato da fala","hab":"Atribuir significado a aspects não linguísticos (paralinguísticos) observados na fala, como direção do olhar, riso, gestos, movimentos da cabeça (de concordância ou discordância), expressão corporal, tom de voz."},
{"code":"EF15LP13","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Oralidade","obj":"Relato oral/Registro formal e informal","hab":"Identificar finalidades da interação oral em diferentes contextos comunicativos (solicitar informações, apresentar opiniões, informar, relatar experiências etc.)."},
{"code":"EF15LP14","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Leitura/escuta","obj":"Leitura de imagens em narrativas visuais","hab":"Construir o sentido de histórias em quadrinhos e tirinhas, relacionando imagens e palavras e interpretando recursos gráficos (tipos de balões, de letras, onomatopeias)."},
{"code":"EF15LP15","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Leitura/escuta","obj":"Formação do leitor literário","hab":"Reconhecer que os textos literários fazem parte do mundo do imaginário e apresentam uma dimensão lúdica, de encantamento, valorizando-os, em sua diversidade cultural, como patrimônio artístico da humanidade."},
{"code":"EF15LP16","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Leitura/escuta","obj":"Leitura colaborativa e autônoma","hab":"Ler e compreender, em colaboração com os colegas e com a ajuda do professor e, mais tarde, de maneira autônoma, textos narrativos de maior porte como contos (populares, de fadas, acumulativos, de assombração etc.) e crônicas."},
{"code":"EF15LP17","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Leitura/escuta","obj":"Apreciação estética/Estilo","hab":"Apreciar poemas visuais e concretos, observando efeitos de sentido criados pelo formato do texto na página, distribuição e diagramação das letras, pelas ilustrações e por outros efeitos visuais."},
{"code":"EF15LP18","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Leitura/escuta","obj":"Formação do leitor literário/Leitura multissemiótica","hab":"Relacionar texto com ilustrações e outros recursos gráficos."},
{"code":"EF15LP19","disc":"Língua Portuguesa","ano":"1º ao 5º ano","assunto":"Oralidade","obj":"Contagem de histórias","hab":"Recontar oralmente, com e sem apoio de imagem, textos literários lidos pelo professor."},
{"code":"EF01LP01","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Leitura/escuta","obj":"Protocolos de leitura","hab":"Reconhecer que textos são lidos e escritos da esquerda para a direita e de cima para baixo da página."},
{"code":"EF12LP01","disc":"Língua Portuguesa","ano":"1º e 2º anos","assunto":"Leitura/escuta","obj":"Decodificação/Fluência de leitura","hab":"Ler palavras novas com precisão na decodificação, no caso de palavras de uso frequente, ler globalmente, por memorização."},
{"code":"EF12LP02","disc":"Língua Portuguesa","ano":"1º e 2º anos","assunto":"Leitura/escuta","obj":"Formação de leitor","hab":"Buscar, selecionar e ler, com a mediação do professor (leitura compartilhada), textos que circulam em meios impressos ou digitais, de acordo com as necessidades e interesses."},
{"code":"EF01LP02","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Escrita","obj":"Correspondência fonema-grafema","hab":"Escrever, espontaneamente ou por ditado, palavras e frases de forma alfabética – usando letras/grafemas que representem fonemas."},
{"code":"EF01LP03","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Escrita","obj":"Construção do sistema alfabético/Convenções da escrita","hab":"Observar escritas convencionais, comparando-as às suas produções escritas, percebendo semelhanças e diferenças."},
{"code":"EF02LP01","disc":"Língua Portuguesa","ano":"2º ano","assunto":"Escrita","obj":"Construção do sistema alfabético/Convenções da escrita","hab":"Utilizar, ao produzir o texto, grafia correta de palavras conhecidas ou com estruturas silábicas já dominadas, letras maiúsculas em início de frases e em substantivos próprios, segmentação entre as palavras, ponto final, ponto de interrogação e ponto de exclamação."},
{"code":"EF12LP03","disc":"Língua Portuguesa","ano":"1º e 2º anos","assunto":"Escrita","obj":"Construção do sistema alfabético/Estabelecimento de relações anafóricas na referenciação e construção da coesão","hab":"Copiar textos breves, mantendo suas características e voltando para o texto sempre que tiver dúvidas sobre sua distribuição gráfica, espaçamento entre as palavras, escrita das palavras e pontuação."},
{"code":"EF01LP04","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Análise linguística/semiótica","obj":"Conhecimento do alfabeto do português do Brasil","hab":"Distinguir as letras do alfabeto de outros sinais gráficos."},
{"code":"EF01LP05","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Análise linguística/semiótica","obj":"Construção do sistema alfabético","hab":"Reconhecer o sistema de escrita alfabética como representação dos sons da fala."},
{"code":"EF01LP06","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Análise linguística/semiótica","obj":"Construção do sistema alfabético e da ortografia","hab":"Segmentar oralmente palavras em sílabas."},
{"code":"EF02LP02","disc":"Língua Portuguesa","ano":"2º ano","assunto":"Análise linguística/semiótica","obj":"Construção do sistema alfabético e da ortografia","hab":"Segmentar palavras em sílabas e remover e substituir sílabas iniciais, mediais ou finais para criar novas palavras."},
{"code":"EF01LP07","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Análise linguística/semiótica","obj":"Construção do sistema alfabético e da ortografia","hab":"Identificar fonemas e sua representação por letras."},
{"code":"EF02LP03","disc":"Língua Portuguesa","ano":"2º ano","assunto":"Análise linguística/semiótica","obj":"Construção do sistema alfabético e da ortografia","hab":"Ler e escrever palavras com correspondências regulares diretas entre letras e fonemas (f, v, t, d, p, b) e correspondências regulares contextuais (c e q; e e o, em posição átona em final de palavra)."},
{"code":"EF01LP08","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Análise linguística/semiótica","obj":"Construção do sistema alfabético e da ortografia","hab":"Relacionar elementos sonoros (sílabas, fonemas, partes de palavras) com sua representação escrita."},
{"code":"EF02LP04","disc":"Língua Portuguesa","ano":"2º ano","assunto":"Análise linguística/semiótica","obj":"Construção do sistema alfabético e da ortografia","hab":"Ler e escrever corretamente palavras com sílabas CV, V, CVC, CCV, identificando que existem vogais em todas as sílabas."},
{"code":"EF01LP09","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Análise linguística/semiótica","obj":"Construção do sistema alfabético e da ortografia","hab":"Comparar palavras, identificando semelhanças e diferenças entre sons de sílabas iniciais."},
{"code":"EF02LP05","disc":"Língua Portuguesa","ano":"2º ano","assunto":"Análise linguística/semiótica","obj":"Construção do sistema alfabético e da ortografia","hab":"Ler e escrever corretamente palavras com marcas de nasalidade (til, m, n)."},
{"code":"EF01LP10","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Análise linguística/semiótica","obj":"Conhecimento do alfabeto do português do Brasil","hab":"Nomear as letras do alfabeto e recitá-lo na ordem das letras."},
{"code":"EF02LP06","disc":"Língua Portuguesa","ano":"2º ano","assunto":"Análise linguística/semiótica","obj":"Conhecimento do alfabeto do português do Brasil","hab":"Perceber o princípio acrofônico que opera nos nomes das letras do alfabeto."},
{"code":"EF01LP11","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Análise linguística/semiótica","obj":"Conhecimento das diversas grafias do alfabeto/Acentuação","hab":"Conhecer, diferenciar e relacionar letras em formato imprensa e cursiva, maiúsculas e minúsculas."},
{"code":"EF02LP07","disc":"Língua Portuguesa","ano":"2º ano","assunto":"Análise linguística/semiótica","obj":"Conhecimento das diversas grafias do alfabeto/Acentuação","hab":"Escrever palavras, frases, textos curtos nas formas imprensa e cursiva."},
{"code":"EF01LP12","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Análise linguística/semiótica","obj":"Segmentação de palavras/Classificação de palavras por número de sílabas","hab":"Reconhecer a separação das palavras, na escrita, por espaços em branco."},
{"code":"EF02LP08","disc":"Língua Portuguesa","ano":"2º ano","assunto":"Análise linguística/semiótica","obj":"Segmentação de palavras/Classificação de palavras por número de sílabas","hab":"Segmentar corretamente as palavras ao escrever frases e textos."},
{"code":"EF01LP13","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Análise linguística/semiótica","obj":"Construção do sistema alfabético","hab":"Comparar palavras, identificando semelhanças e diferenças entre sons de sílabas mediais e finais."},
{"code":"EF01LP14","disc":"Língua Portuguesa","ano":"1º ano","assunto":"Análise linguística/semiótica","obj":"Pontuação","hab":"Identificar outros sinais no texto além das letras, como pontos finais, de interrogação e exclamação e seus efeitos na entonação."},
{"code":"EF02LP09","disc":"Língua Portuguesa","ano":"2º ano","assunto":"Análise linguística/semiótica","obj":"Pontuação","hab":"Usar adequadamente ponto final, ponto de interrogação e ponto de exclamação."},

{"code":"EF05ER07","disc":"Ensino Religioso","ano":"5º ano","assunto":"Crenças religiosas e filosofias de vida","obj":"Ancestralidade e tradição oral","hab":"Reconhecer, em textos orais, ensinamentos relacionados a modos de ser e viver."}

const input = document.getElementById('searchInput');
const dropdown = document.getElementById('dropdown');
const clearBtn = document.getElementById('clearBtn');
const ghostText = document.getElementById('ghostText');
const searchBox = document.getElementById('searchBox');
const resultArea = document.getElementById('resultArea');
const resultCard = document.getElementById('resultCard');
const rcCode = document.getElementById('rcCode');
const rcAssunto = document.getElementById('rcAssunto');
const rcObj = document.getElementById('rcObj');
const rcTags = document.getElementById('rcTags');
const rcHab = document.getElementById('rcHab');

let filtered = [];
let currentIndex = -1;

function norm(s) {
  if (!s) return '';
  return s.toString().toUpperCase().replace(/\s/g, '');
}

function getMatches(val) {
  if (!val) return [];
  const n = norm(val);
  return DATA.filter(d => norm(d.code).startsWith(n)).slice(0, 8);
}

function updateGhost(val) {
  if (!val) {
    ghostText.innerHTML = '';
    return;
  }
  const nVal = norm(val);
  const match = DATA.find(d => norm(d.code).startsWith(nVal));
  if (match && norm(match.code) !== nVal) {
    const originalCode = match.code;
    const remaining = originalCode.substring(nVal.length);
    ghostText.innerHTML = `<span style="color:transparent">${val}</span><span>${remaining}</span>`;
  } else {
    ghostText.innerHTML = '';
  }
}

function getSubjectColor(disc) {
  const map = {
    'Língua Portuguesa': { bg: '#e8f0fe', color: '#1967d2' },
    'Matemática': { bg: '#e6f4ea', color: '#1e8e3e' },
    'Arte': { bg: '#fce8e6', color: '#c5221f' },
    'Educação Física': { bg: '#fef7e0', color: '#e37400' },
    'Ciências': { bg: '#e4f7fb', color: '#00838f' },
    'Geografia': { bg: '#f3e8fd', color: '#12b5cb' },
    'História': { bg: '#fce4ec', color: '#9334e6' },
    'Ensino Religioso': { bg: '#f1f3f4', color: '#5f6368' }
  };
  return map[disc] || { bg: '#f1f3f4', color: '#5f6368' };
}

function showResult(item, isExact = false) {
  resultArea.style.display = 'block';
  if (isExact) {
    resultCard.classList.remove('faded');
  } else {
    resultCard.classList.add('faded');
  }
  
  rcCode.textContent = item.code;
  rcAssunto.textContent = item.assunto || "Não especificado";
  rcObj.textContent = item.obj || "Não especificado";
  rcHab.textContent = item.hab || "Não especificada";
  
  const colorObj = getSubjectColor(item.disc);
  rcTags.innerHTML = `
    <span class="tag tag-disc" style="background:${colorObj.bg}; color:${colorObj.color}; border-color: transparent;">${item.disc}</span>
    <span class="tag tag-ano">${item.ano}</span>
  `;
}

function renderDropdown(val) {
  filtered = getMatches(val);
  currentIndex = -1;
  if (!filtered.length || !val) {
    dropdown.style.display = 'none';
    searchBox.classList.remove('active');
    return;
  }
  searchBox.classList.add('active');
  dropdown.style.display = 'block';
  dropdown.innerHTML = filtered.map((d, i) => `
    <div class="dropdown-item" data-index="${i}">
      <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" style="margin-right:21px; fill:var(--text-muted);">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
      </svg>
      <span class="dd-code">${d.code}</span>
      <span class="dd-desc">${d.obj}</span>
    </div>
  `).join('');
  
  dropdown.querySelectorAll('.dropdown-item').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      selectItem(Number(el.dataset.index));
    });
  });
}

function selectItem(index) {
  const item = filtered[index];
  input.value = item.code;
  dropdown.style.display = 'none';
  searchBox.classList.remove('active');
  ghostText.innerHTML = '';
  clearBtn.classList.add('show');
  showResult(item, true);
}

input.addEventListener('input', () => {
  const val = input.value.trim();
  clearBtn.classList.toggle('show', !!val);
  updateGhost(val);
  renderDropdown(val);
  const exactMatch = DATA.find(d => norm(d.code) === norm(val));
  if (exactMatch) {
    showResult(exactMatch, true);
  } else if (filtered.length > 0) {
    showResult(filtered[0], false); 
  } else {
    resultArea.style.display = 'none';
  }
});

input.addEventListener('keydown', e => {
  if (!filtered.length) return;
  const items = dropdown.querySelectorAll('.dropdown-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    currentIndex = Math.min(currentIndex + 1, filtered.length - 1);
    items.forEach((el, i) => el.classList.toggle('focused', i === currentIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    currentIndex = Math.max(currentIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('focused', i === currentIndex));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (currentIndex >= 0) selectItem(currentIndex);
    else selectItem(0);
  } else if (e.key === 'Tab' && filtered.length > 0) {
    e.preventDefault();
    input.value = filtered[0].code;
    updateGhost(input.value);
    renderDropdown(input.value);
    showResult(filtered[0], true);
  }
});

input.addEventListener('blur', () => {
  setTimeout(() => {
    dropdown.style.display = 'none';
    searchBox.classList.remove('active');
  }, 150);
});

input.addEventListener('focus', () => {
  if (input.value.trim() && filtered.length > 0) {
    searchBox.classList.add('active');
    dropdown.style.display = 'block';
  }
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.classList.remove('show');
  ghostText.innerHTML = '';
  dropdown.style.display = 'none';
  searchBox.classList.remove('active');
  resultArea.style.display = 'none';
  input.focus();
});

function copyContent(elementId) {
  const text = document.getElementById(elementId).innerText;
  navigator.clipboard.writeText(text);
}

window.addEventListener('focus', async () => {
  try {
    const text = await navigator.clipboard.readText();
    const clipboardCode = text.trim().toUpperCase();
    
    const regex = /^[A-Z]{2}\d{2}[A-Z]{2}\d{2}$/;
    
    if (regex.test(clipboardCode)) {
      if (input.value !== clipboardCode) {
        input.value = clipboardCode;
        input.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }
  } catch (err) {
  }
});

</script>
